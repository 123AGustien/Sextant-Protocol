name: POC Simulation Run

on:
  workflow_dispatch:
  push:

jobs:
  run-poc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run POC simulation
        run: python poc_demo.py

      - name: Upload result.json
        uses: actions/upload-artifact@v4
        with:
          name: poc-output
          path: result.json
