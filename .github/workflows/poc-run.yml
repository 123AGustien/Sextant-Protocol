name: POC Simulation Run

on:
  workflow_dispatch:

jobs:
  run-poc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run simulation
        run: python poc_demo.py
